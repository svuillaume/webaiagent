[project]
name = "forticnapp-mcp"
version = "0.1.0"
description = "MCP server exposing FortiCNAPP (Lacework) API 2.0 operations as typed, auth-aware tools"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "FortiCNAPP MCP maintainers" }]

dependencies = [
    "mcp>=1.24.0,<2.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "python-dotenv>=1.0.0",
    "PyYAML>=6.0.0",
    "anyio>=4.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "ruff>=0.5.0",
]

[project.scripts]
forticnapp-mcp = "forticnapp_mcp.main:run"
forticnapp-mcp-setup = "forticnapp_mcp.setup_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forticnapp_mcp"]

[tool.ruff]
line-length = 110
target-version = "py311"
