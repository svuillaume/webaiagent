<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bifrost — Fortinet AI Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { border-top: 3px solid #EE3124; }

:root {
  --bg:        #ffffff;
  --surface:   #f7f8fa;
  --surface2:  #f0f2f5;
  --border:    #e0e2e8;
  --accent:    #EE3124;
  --accent-d:  #c41e14;
  --navy:      #1a1a2e;
  --navy-d:    #111120;
  --text:      #1d1d2e;
  --text-body: #374151;
  --muted:     #6b7280;
  --ok:        #2e7d55;
  --err:       #c0392b;
  --code-bg:   #f5f6f8;
  --mono:      "SF Mono", "Fira Code", "Consolas", monospace;
  --sans:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  font-family: var(--sans);
  font-size: 14px;
  background: var(--bg);
  color: var(--text-body);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Nav / Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 52px;
  background: var(--navy);
  border-bottom: 3px solid var(--accent);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 8px;
}

.brand img {
  height: 22px;
  filter: brightness(0) invert(1);
}

.brand-sep {
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,.25);
}

.brand-label {
  font: 600 13px/1 var(--sans);
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.85);
}

#toolbar label {
  color: rgba(255,255,255,.5);
  font: 600 11px/1 var(--sans);
  letter-spacing: .05em;
  text-transform: uppercase;
  white-space: nowrap;
}

#toolbar input, #toolbar select {
  font: 13px/1 var(--sans);
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  color: #fff;
  padding: 5px 10px;
  border-radius: 4px;
  outline: none;
  transition: border-color .15s;
}

#toolbar input:focus, #toolbar select:focus {
  border-color: var(--accent);
}

#toolbar select option { background: var(--navy); color: #fff; }
#key-input { width: 200px; }
#toolbar select { cursor: pointer; }

#toolbar input::placeholder { color: rgba(255,255,255,.35); }

#status {
  margin-left: auto;
  font: 600 11px/1 var(--sans);
  letter-spacing: .05em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  transition: color .2s;
}
#status.ok   { color: #4ade80; }
#status.err  { color: #f87171; }
#status.busy { color: rgba(255,255,255,.55); }

/* ── Messages ── */
#log {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}

#log::-webkit-scrollbar { width: 4px; }
#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.turn {
  display: flex;
  gap: 0;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  line-height: 1.65;
  animation: in .12s ease;
}

.turn.turn-user {
  background: var(--bg);
}

.turn.turn-ai {
  background: var(--surface);
  border-left: 3px solid var(--accent);
}

.turn.turn-system {
  background: #fff8f8;
  border-left: 3px solid var(--err);
}

@keyframes in { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

.turn:last-child { border-bottom: none; }

.role {
  width: 100px;
  flex-shrink: 0;
  font: 600 11px/1.4 var(--sans);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding-top: 3px;
  user-select: none;
}

.role.user   { color: var(--accent); }
.role.ai     { color: var(--muted); }
.role.system { color: var(--err); }

.content {
  flex: 1;
  font: 14px/1.65 var(--mono);
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  color: var(--text-body);
}

.content code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--code-bg);
  color: #c0392b;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
}

.content pre code { background: none; padding: 0; border: none; color: var(--text-body); }

.cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input ── */
#input-row {
  display: flex;
  background: var(--bg);
  border-top: 2px solid var(--border);
  flex-shrink: 0;
}

#prompt {
  flex: 1;
  font: 14px/1.55 var(--mono);
  padding: 12px 16px;
  border: none;
  outline: none;
  resize: none;
  min-height: 46px;
  max-height: 180px;
  background: transparent;
  color: var(--text);
}

#prompt::placeholder { color: var(--muted); }

#send {
  font: 600 12px/1 var(--sans);
  letter-spacing: .04em;
  text-transform: uppercase;
  background: var(--accent);
  color: #fff;
  border: none;
  border-left: 1px solid var(--border);
  padding: 0 22px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}

#send:hover:not(:disabled) { background: var(--accent-d); }
#send:disabled { opacity: .35; cursor: not-allowed; }

/* ── Footer ── */
#hint {
  padding: 5px 24px;
  font: 11px/1 var(--sans);
  color: var(--muted);
  background: var(--navy);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#hint a { color: rgba(255,255,255,.35); text-decoration: none; }
#token-info { color: rgba(255,255,255,.5); font: 600 11px/1 var(--sans); letter-spacing: .03em; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="brand">
    <img src="https://www.fortinet.com/content/dam/fortinet-blog/fortinet-logo-white.svg" alt="Fortinet" />
    <div class="brand-sep"></div>
    <span class="brand-label">Bifrost</span>
  </div>
  <label>key</label>
  <input id="key-input" type="password" placeholder="sk-ant-…" autocomplete="off" />
  <label>model</label>
  <select id="model">
    <option value="claude-haiku-4-5">haiku-4-5</option>
    <option value="claude-sonnet-4-6" selected>sonnet-4-6</option>
    <option value="claude-opus-4-8">opus-4-8</option>
  </select>
  <label>tokens</label>
  <select id="max-tokens">
    <option value="512">512</option>
    <option value="1024">1024</option>
    <option value="2048" selected>2048</option>
    <option value="4096">4096</option>
    <option value="8192">8192</option>
  </select>
  <span id="status">—</span>
</div>

<div id="log"></div>

<div id="input-row">
  <textarea id="prompt" placeholder="message…" rows="1" oninput="resize(this)" onkeydown="onKey(event)"></textarea>
  <button id="send" onclick="send()">Send ↵</button>
</div>

<div id="hint">
  <span>shift+enter: newline</span>
  <span id="token-info"></span>
</div>

<script>
const BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? `${location.protocol}//${location.host}/proxy`
  : 'https://bifrost.fabriclab.ca/anthropic';

const history = [];
let busy = false;

const $  = id => document.getElementById(id);
const st = (msg, cls='') => { const s=$('status'); s.textContent=msg; s.className=cls; };

// ── Markdown (minimal) ────────────────────────────────────────────────────
function render(t) {
  const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${e(c.trimEnd())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, (_,c) => `<code>${e(c)}</code>`);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return t;
}

// ── Persist key ───────────────────────────────────────────────────────────
const ki = $('key-input');
const saved = localStorage.getItem('bf_key');
if (saved) ki.value = saved;
ki.addEventListener('change', () => {
  const v = ki.value.trim();
  v ? localStorage.setItem('bf_key', v) : localStorage.removeItem('bf_key');
});

// ── Auto-resize textarea ──────────────────────────────────────────────────
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

// ── Append turn ───────────────────────────────────────────────────────────
function appendTurn(role, text='', modelLabel='') {
  const div = document.createElement('div');
  div.className = `turn turn-${role}`;

  const rl = document.createElement('div');
  rl.className = `role ${role}`;
  let roleText = role === 'user' ? 'you ›' : role === 'ai' ? (modelLabel || 'ai') + ' ›' : 'sys ›';
  rl.textContent = roleText;

  const ct = document.createElement('div');
  ct.className = 'content';
  if (text) ct.innerHTML = render(text);

  div.appendChild(rl);
  div.appendChild(ct);
  $('log').appendChild(div);
  scroll();
  return ct;
}

function scroll() {
  const l = $('log'); l.scrollTop = l.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────
async function send() {
  if (busy) return;

  const key   = $('key-input').value.trim();
  const model = $('model').value;
  const maxTk = parseInt($('max-tokens').value);
  const text  = $('prompt').value.trim();

  if (!key)  { appendTurn('system', 'error: no key set'); return; }
  if (!text) return;

  history.push({ role: 'user', content: text });
  appendTurn('user', text);
  $('prompt').value = '';
  $('prompt').style.height = 'auto';

  const shortModel = model.replace('claude-','').replace('-20251001','');
  const aiBubble = appendTurn('ai', '', shortModel);
  const cursor   = Object.assign(document.createElement('span'), { className: 'cursor' });
  aiBubble.appendChild(cursor);

  busy = true;
  $('send').disabled = true;
  st('streaming…', 'busy');

  let out = '';
  let inputTk = 0, outputTk = 0;

  try {
    const res = await fetch(`${BASE_URL}/v1/messages`, {
      method:  'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         key,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({ model, max_tokens: maxTk, stream: true, messages: history }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`${res.status}: ${err}`);
    }

    const reader  = res.body.getReader();
    const dec     = new TextDecoder();
    let   buf     = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') break;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            out += ev.delta.text;
            aiBubble.innerHTML = render(out);
            aiBubble.appendChild(cursor);
            scroll();
          }
          if (ev.type === 'message_start') {
            inputTk = ev.message?.usage?.input_tokens ?? 0;
          }
          if (ev.type === 'message_delta') {
            outputTk = ev.usage?.output_tokens ?? 0;
          }
        } catch (_) {}
      }
    }

    cursor.remove();
    aiBubble.innerHTML = render(out);
    history.push({ role: 'assistant', content: out });
    st('ok', 'ok');
    $('token-info').textContent = `↑ sent:${inputTk}  ↓ recv:${outputTk}  total:${inputTk+outputTk} tokens`;

  } catch (err) {
    cursor.remove();
    aiBubble.textContent = `error: ${err.message}`;
    history.pop();
    st('error', 'err');
  } finally {
    busy = false;
    $('send').disabled = false;
    scroll();
  }
}

$('prompt').focus();
</script>
</body>
</html>
