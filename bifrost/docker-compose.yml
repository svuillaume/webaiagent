services:
  searxng:
    image: searxng/searxng:latest
    container_name: bifrost-search
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

  bifrost:
    build: .
    container_name: bifrost-serve
    ports:
      - "8765:8765"
    env_file:
      - .env
    volumes:
      # Mount lacework credentials so the container can authenticate
      - ~/.lacework.toml:/root/.lacework.toml:ro
      # Mount lacework components cache to avoid re-downloading every start
      - ~/.config/lacework:/root/.config/lacework
      - ~/claude_cnapp/lql/lql_queries:/lql_queries:ro
    depends_on:
      - searxng
    restart: unless-stopped
