<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FortiAIScout</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: -apple-system, "Segoe UI", system-ui, sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;

  --bg:         #0f1117;
  --surface:    #181b22;
  --surface2:   #1f232d;
  --surface3:   #272b36;
  --border:     #2a2e3d;
  --dim:        #4a5166;
  --text:       #e2e5ef;
  --muted:      #7b859a;
  --accent:     #ee3124;
  --accent-d:   #c41230;
  --accent-bg:  rgba(238,49,36,.08);
  --ok:         #3cb17e; /* Fortinet Green — PMS 7724 C */
  --ok-bg:      rgba(60,177,126,.1);
  --warn:       #fbbf24;
  --err:        #f87171;
  --err-bg:     rgba(248,113,113,.08);
  --blue:       #60a5fa;
  --blue-bg:    rgba(96,165,250,.08);
  --purple:     #9063cd; /* Fortinet Purple — PMS 265 C */
  --purple-bg:  rgba(144,99,205,.1);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #f5f6f8;
    --surface3:   #eceef2;
    --border:     #d4d8e2;
    --dim:        #9aa0b0;
    --text:       #1a1d2e;
    --muted:      #5a6070;
    --accent:     #ee3124;
    --accent-d:   #c41230;
    --accent-bg:  rgba(238,49,36,.06);
    --ok:         #3cb17e; /* Fortinet Green — PMS 7724 C */
    --ok-bg:      rgba(60,177,126,.08);
    --warn:       #d97706;
    --err:        #dc2626;
    --err-bg:     rgba(220,38,38,.06);
    --blue:       #2563eb;
    --blue-bg:    rgba(37,99,235,.06);
    --purple:     #9063cd; /* Fortinet Purple — PMS 265 C */
    --purple-bg:  rgba(144,99,205,.08);
  }
}

html, body { height: 100%; width: 100%; }

body {
  font-family: var(--sans);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Row 1: Config bar ───────────────────────────────────────────────────── */
/* No longer a visible bar — only holds hidden gateway-credential inputs now that gateway/model
   selects and the status dot moved into the action bar / Admin menu. Zero padding so it doesn't
   render as an empty strip (all children are display:none). */
#config-bar {
  display: flex;
  align-items: center;
}

.brand {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  margin-right: 6px;
}

#config-bar label {
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}

#config-bar input, #config-bar select {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}
#config-bar input:focus, #config-bar select:focus { border-color: var(--accent); }
#gateway   { width: 88px;  font-family: var(--sans); font-size: 11px; }
#url-input { width: 150px; }
#key-input { width: 110px; }
#model     { width: 138px; font-family: var(--sans); font-size: 11px; }

/* Status dot: ::before so setStatus(text, cls) works unchanged */
#status {
  margin-left: auto; /* pushes status (and Clear right after it) to the far right of #action-bar */
  font-size: 10px;
  color: var(--dim);
  transition: color .2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
#status::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
#status.ok   { color: var(--ok); }
#status.ok::before   { background: var(--ok); }
#status.err  { color: var(--err); }
#status.err::before  { background: var(--err); }
#status.busy { color: var(--muted); }
#status.busy::before { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }

.headroom-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 8px;
  white-space: nowrap;
  flex-shrink: 0;
  cursor: default;
}
.headroom-badge.ok { color: var(--ok); border-color: rgba(52,211,153,.3); }
#routing-badge { cursor: pointer; margin-left: auto; transition: border-color .12s, background .12s; }
#routing-badge:hover { background: var(--surface3); border-color: var(--dim); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* ── Row 2: Action bar ───────────────────────────────────────────────────── */
#action-bar {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 5px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
#action-bar::-webkit-scrollbar { display: none; }

.sep {
  width: 1px;
  height: 14px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 3px;
}

/* Pill chip buttons */
.chip {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  transition: color .12s, background .12s, border-color .12s;
  line-height: 1;
}
.chip:hover           { color: var(--text);    background: var(--surface3); border-color: var(--border); }
.chip:disabled        { opacity: .3; cursor: not-allowed; }
.chip.lw-disabled     { opacity: .35; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
.chip.lw-disabled:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
.chip.active          { color: var(--ok);      background: var(--ok-bg);    border-color: rgba(52,211,153,.25); }
.chip.busy            { color: var(--dim);     background: transparent;     cursor: wait; }
.chip.accent:hover    { color: var(--accent);  background: var(--accent-bg);border-color: rgba(238,49,36,.25); }
.chip.success:hover   { color: var(--ok);      background: var(--ok-bg);    border-color: rgba(52,211,153,.25); }
.chip.danger:hover    { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }
.chip.danger.active   { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }
#clear                { margin-left: auto; }
#clear:hover          { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }

/* ── FortiCNAPP dropdown ─────────────────────────────────────────────────── */
#fcnapp-wrap { position: relative; flex-shrink: 0; }
#fcnapp-btn  { gap: 5px; }
#fcnapp-btn .caret { font-size: 8px; opacity: .6; transition: transform .15s; }
#fcnapp-btn.open .caret { transform: rotate(180deg); }
#fcnapp-menu {
  display: none;
  position: fixed;
  z-index: 200;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  min-width: 150px;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
}
#fcnapp-menu.open { display: flex; flex-direction: column; gap: 2px; }
.fcnapp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  border: none;
  background: transparent;
  white-space: nowrap;
  width: 100%;
  text-align: left;
  transition: background .1s, color .1s;
}
.fcnapp-item:hover        { background: var(--surface3); }
.fcnapp-item.lw-disabled  { opacity: .35; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
.fcnapp-item.accent:hover { color: var(--accent); background: var(--accent-bg); }
.fcnapp-item.success:hover{ color: var(--ok);     background: var(--ok-bg); }
.fcnapp-item.danger:hover { color: var(--err);    background: var(--err-bg); }
.fcnapp-sep { height: 1px; background: var(--border); margin: 4px 2px; }

/* ── Admin dropdown: gateway, model, TokenIQ, community ──────────────────── */
#admin-wrap { position: relative; flex-shrink: 0; }
#admin-btn  { gap: 5px; }
#admin-btn .caret { font-size: 8px; opacity: .6; transition: transform .15s; }
#admin-btn.open .caret { transform: rotate(180deg); }
.admin-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
.admin-dot.ok { background: var(--ok); }
#admin-menu {
  display: none;
  position: fixed;
  z-index: 200;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  min-width: 190px;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
}
#admin-menu.open { display: flex; flex-direction: column; gap: 3px; }
.admin-menu-label {
  font: 700 9px/1 var(--sans);
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  padding: 3px 2px 1px;
}
.admin-select {
  font-family: var(--sans);
  font-size: 11px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 6px;
  outline: none;
  width: 100%;
}
.admin-select:focus { border-color: var(--accent); }
.admin-item.headroom-badge {
  width: 100%;
  text-align: left;
  border-radius: 6px;
  padding: 7px 10px;
  box-sizing: border-box;
}
/* ── SBOM format picker sub-menu ─────────────────────────────────────────── */
#sbom-picker {
  display: none;
  position: fixed;
  z-index: 210;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px 8px;
  min-width: 200px;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  flex-direction: column;
  gap: 2px;
}
#sbom-picker.open { display: flex; }
.sbom-picker-title {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 0 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.sbom-fmt-group { padding: 4px 0 2px; }
.sbom-fmt-group-label {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 2px 0;
}
.sbom-fmt-option {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 6px;
  border-radius: 5px;
  cursor: pointer;
  transition: background .1s;
}
.sbom-fmt-option:hover { background: var(--surface3); }
.sbom-fmt-option input[type=radio] { accent-color: var(--accent); cursor: pointer; margin: 0; }
.sbom-fmt-option span {
  font-family: var(--mono, monospace);
  font-size: 11px;
  color: var(--text);
  cursor: pointer;
  flex: 1;
}
.sbom-fmt-option span em {
  font-style: normal;
  font-size: 9px;
  color: var(--muted);
  margin-left: 5px;
}
.sbom-picker-go {
  margin-top: 8px;
  padding: 6px 0 0;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}
.sbom-picker-go button {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  border-radius: 6px;
  border: none;
  padding: 5px 14px;
  cursor: pointer;
  transition: opacity .1s;
}
#sbom-generate { background: var(--accent); color: #fff; }
#sbom-generate:hover { opacity: .88; }
#sbom-cancel { background: var(--surface3); color: var(--muted); }
#sbom-cancel:hover { color: var(--text); }

/* ── Drawers (shared) ────────────────────────────────────────────────────── */
.drawer {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 360px;
}
.drawer.open { display: flex; }
#lql-panel { max-height: 55vh; }

.drawer-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
  flex-shrink: 0;
}
.drawer-close {
  margin-left: auto;
  cursor: pointer;
  color: var(--dim);
  font-size: 13px;
  line-height: 1;
  transition: color .12s;
  user-select: none;
}
.drawer-close:hover { color: var(--err); }

.drawer-body {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  flex-shrink: 0;
}

.drawer-input {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 9px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}
.drawer-input:focus { border-color: var(--accent); }

.drawer-select {
  font-family: var(--sans);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 9px;
  border-radius: 6px;
  outline: none;
  flex: 1;
  min-width: 160px;
}
.drawer-select:focus { border-color: var(--accent); }

.drawer-btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: filter .12s, opacity .12s;
  white-space: nowrap;
}
.drawer-btn:hover:not(:disabled) { filter: brightness(1.12); }
.drawer-btn:disabled { opacity: .4; cursor: wait; }
.drawer-btn.primary   { background: var(--accent); color: #fff; }
.drawer-btn.secondary {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.drawer-btn.secondary:hover { color: var(--text); border-color: var(--muted); }

.drawer-status { font-size: 10px; color: var(--dim); }
.drawer-status.ok  { color: var(--ok); }
.drawer-status.err { color: var(--err); }

/* A little sailboat cruising around the whole panel while AI Assist fetches/retries/enriches,
   leaving a brief fading wake behind it — pure fun, no functional role. panel.js handles the
   roaming logic; these classes are just the visual pieces. */
.lql-boat, .lql-wake {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
}
.lql-boat {
  display: none;
  font-size: 40px;
  line-height: 1;
  transform-origin: 50% 65%;
  left: 0; top: 0; /* actual position comes entirely from offset-path — JS only ever sets that */
  offset-rotate: 0deg; /* fixed — stays upright all the way around the circle, never tilts to face travel direction */
  --dir: 1; /* flipped by JS on a random timer — simulates the sail changing side on crossing winds */
  /* Two independent animations: boat-sail moves it along the current circle (JS swaps
     offset-path + animation-duration for a new random-size circle periodically), boat-rock
     layers a gentle vertical bob + the current --dir flip on top — offset-path motion and
     `transform` compose, not conflict. */
  animation: boat-rock 2.2s ease-in-out infinite, boat-sail 12s linear infinite;
}
.lql-wake {
  font-size: 13px;
  line-height: 1;
  opacity: .8;
  animation: wake-fade 1.6s ease-out forwards;
}

@keyframes boat-rock {
  0%, 100% { transform: translateY(0)   scaleX(var(--dir, 1)); }
  50%      { transform: translateY(-4px) scaleX(var(--dir, 1)); }
}
@keyframes boat-sail {
  from { offset-distance: 0%; }
  to   { offset-distance: 100%; }
}
@keyframes wake-fade {
  0%   { opacity: .8; transform: scale(1)  translateY(0); }
  100% { opacity: 0;  transform: scale(.4) translateY(6px); }
}

.drawer-results {
  flex: 1;
  overflow: auto;
  padding: 0 14px 12px;
}
.drawer-results::-webkit-scrollbar { width: 6px; }
.drawer-results::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
.drawer-results::-webkit-scrollbar-track { background: var(--surface2); }

/* ── CodeSec drawer ──────────────────────────────────────────────────────── */
#codesec-panel .drawer-header { color: var(--accent); }
#codesec-body { padding: 10px 14px; overflow-y: auto; max-height: 300px; }

.cs-section-title {
  font-size: 9px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin: 12px 0 5px;
}
.cs-section-title:first-child { margin-top: 0; }
.cs-row {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 3px 8px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
  align-items: start;
}
.cs-fix-btn {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 3px;
  font-size: 9px;
  padding: 1px 5px;
  cursor: pointer;
  white-space: nowrap;
  margin-top: 1px;
}
.cs-fix-btn:hover { background: var(--accent); color: #fff; }
.cs-row:last-child { border-bottom: none; }
.cs-sev {
  font-weight: 700;
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: .4px;
  padding-top: 1px;
}
.cs-sev.critical { color: #f87171; }
.cs-sev.high     { color: #fb923c; }
.cs-sev.medium   { color: #fbbf24; }
.cs-sev.low      { color: var(--muted); }
.cs-detail       { color: var(--text); font-size: 11px; }
.cs-detail .cs-sub { color: var(--muted); font-size: 10px; }
.cs-empty { color: var(--ok); padding: 6px 0; font-size: 11px; }
.cs-sbom-actions { display: flex; gap: 8px; padding: 6px 0 2px; }
.cs-sbom-btn {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: color .12s, border-color .12s;
}
.cs-sbom-btn:hover { color: var(--accent); border-color: rgba(238,49,36,.4); }

/* ── Compliance drawer ───────────────────────────────────────────────────── */
#compliance-panel .drawer-header { color: var(--ok); }

/* ── CVE drawer ──────────────────────────────────────────────────────────── */
#cve-panel { max-height: 440px; }
#cve-panel .drawer-header { color: var(--err); }
#cve-input { text-transform: uppercase; width: 152px; }
#cve-input:focus { border-color: var(--err); }
#cve-search { background: var(--err); }

.cve-summary {
  font-size: 11px;
  color: var(--muted);
  padding: 4px 0 10px;
}
.cve-host {
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-left-color .15s;
}
.cve-host.exposed { border-left-color: var(--err); }
.cve-host-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface2);
  flex-wrap: wrap;
}
.cve-host-name {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text);
}
.cve-badge {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.cve-badge.internet  { background: var(--err-bg);  color: var(--err);  }
.cve-badge.container { background: var(--blue-bg); color: var(--blue); }
.cve-badge.critical  { background: rgba(248,113,113,.14); color: #f87171; }
.cve-badge.high      { background: rgba(251,146,60,.14);  color: #fb923c; }
.cve-risk { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--dim); }
.cve-host-body { padding: 6px 10px; }
.cve-row { display: flex; gap: 8px; padding: 2px 0; font-size: 10px; }
.cve-row .cve-label {
  color: var(--dim); width: 66px; flex-shrink: 0;
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .4px; padding-top: 1px;
}
.cve-row .cve-val { color: var(--text); font-family: var(--mono); }
.cve-row .cve-val.fix { color: var(--ok); }
.cve-containers { margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border); }

/* ── LQL drawer ──────────────────────────────────────────────────────────── */
#lql-panel .drawer-header { color: var(--accent); }

/* LQL HTML table */
.lql-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin: 0;
}

.lql-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--mono);
  line-height: 1.45;
}

.lql-table thead th {
  position: sticky;
  top: 0;
  background: var(--surface3);
  color: var(--dim);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  font-size: 9.5px;
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.lql-table tbody tr:nth-child(even) { background: var(--surface2); }
.lql-table tbody tr:hover { background: var(--accent-bg); }

.lql-table tbody td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.lql-table tbody tr:last-child td { border-bottom: none; }

.lql-table a.lql-link {
  color: var(--accent);
  text-decoration: none;
}
.lql-table a.lql-link:hover { text-decoration: underline; }

.lql-export-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0 7px;
}

.lql-export-btn {
  font: 600 10px/1 var(--sans);
  letter-spacing: .04em;
  text-transform: uppercase;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 9px;
  cursor: pointer;
  transition: background .12s, color .12s;
}
.lql-export-btn:hover { background: var(--surface3); color: var(--text); }

.lql-row-note {
  font-size: 10px;
  color: var(--dim);
  font-style: italic;
}

#lql-gen-preview pre,
.lql-query-preview pre {
  font-family: var(--mono);
  font-size: 10.5px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  line-height: 1.5;
  margin: 6px 0 0;
}
.lql-query-preview {
  margin: 0 0 8px;
}
.lql-query-preview summary {
  font: 600 10px/1 var(--sans);
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  padding: 2px 0;
}
.lql-query-preview summary:hover { color: var(--text); }

/* LQL tabs */
.lql-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.lql-tab {
  font-size: 11px;
  font-weight: 500;
  padding: 6px 14px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color .12s, border-color .12s;
  user-select: none;
}
.lql-tab:hover { color: var(--text); }
.lql-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.lql-pane { display: none; }
.lql-pane.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }

/* ── Chat log tabs ───────────────────────────────────────────────────────── */
#log-tabs {
  display: flex;
  gap: 2px;
  padding: 5px 10px 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.log-tab {
  font: 600 10px/1 var(--sans);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 5px 12px 6px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: color .12s, border-color .12s;
  border-radius: 4px 4px 0 0;
}
.log-tab:hover  { color: var(--text); }
.log-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Chat log panes ──────────────────────────────────────────────────────── */
.log-pane {
  display: none;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  flex-direction: column;
  padding: 8px 0 4px;
  gap: 2px;
}
.log-pane.active {
  display: flex;
}
.log-pane::-webkit-scrollbar { width: 3px; }
.log-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Session boundary marker shown in History tab */
.session-sep {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  text-align: center;
  padding: 6px 0 2px;
  border-top: 1px solid var(--border);
  margin: 4px 14px 0;
}

@keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

/* ── Turn rows — flat, labeled log entries (no bubbles/avatars) ── */
.turn {
  display: flex;
  flex-direction: column;
  padding: 5px 14px;
  animation: fadein .15s ease;
}
.turn-system { align-items: center; padding: 3px 14px; }

/* Avatars removed for a flatter, less decorative log */
.role { display: none; }

.content {
  padding: 6px 0 6px 10px;
  border-left: 2px solid var(--border);
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 13.5px;
  line-height: 1.6;
  min-width: 0;
  color: var(--text);
  background: transparent;
}
.turn-user .content {
  border-left-color: var(--accent);
}
/* AI content keeps its light card + report color language for PDF export consistency, but now
   carries a Fortinet Purple accent bar — the "AI box" brand marker. */
.turn-ai .content {
  border-left: 3px solid var(--purple);
  background: #f8f9fa;
  color: #111111;
  border-top: 1px solid #d0d5dd;
  border-right: 1px solid #d0d5dd;
  border-bottom: 1px solid #d0d5dd;
  border-radius: 6px;
  padding: 9px 12px;
}
.turn-system .content {
  border-left: none;
  background: var(--surface2);
  color: var(--muted);
  font-size: 10.5px;
  font-family: var(--mono);
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 95%;
  text-align: center;
}

/* ── Sender label above content ── */
.turn-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--dim);
  padding: 0 0 2px 12px;
  user-select: none;
}
.turn-user .turn-label  { color: var(--accent); }
.turn-ai   .turn-label  { color: var(--purple); }

/* ── Content wrapper ── */
.bubble-col {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: none;
}

.content code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(255,255,255,.15);
  color: inherit;
  padding: 1px 5px;
  border-radius: 4px;
}
.turn-ai .content code {
  background: #e8edf2;
  color: var(--purple);
  border: 1px solid #c8d0da;
}
.content pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 9px 12px;
  overflow-x: auto;
  margin: 6px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.55;
  white-space: pre;
  color: var(--text);
}
.turn-user .content pre { border-left-color: rgba(255,255,255,.4); }
.content pre code { background: none; padding: 0; color: inherit; }
a.ext-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
a.ext-link:hover { color: var(--accent-d); }

/* ── AI bubble rich markdown ──────────────────────────────────────────────── */
.turn-ai .content h2.md-h,
.turn-ai .content h3.md-h,
.turn-ai .content h4.md-h {
  font-family: var(--sans);
  font-weight: 700;
  color: #ffffff;
  margin: 14px 0 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid #333;
  line-height: 1.3;
}
.turn-ai .content h2.md-h,
.turn-ai .content h3.md-h,
.turn-ai .content h4.md-h { border-bottom-color: #d0d5dd; }
.turn-ai .content h2.md-h { font-size: 15px;   letter-spacing: .2px; color: var(--purple); }
.turn-ai .content h3.md-h { font-size: 13.5px; color: var(--purple); border-bottom: none; margin-bottom: 2px; }
.turn-ai .content h4.md-h { font-size: 13px;   color: #444444; border-bottom: none; font-weight: 600; }
.turn-ai .content p  { margin: 3px 0; color: #111111; }
.turn-ai .content br { display: block; margin: 4px 0; content: ''; }
.turn-ai .content ul,
.turn-ai .content ol { margin: 4px 0 4px 18px; padding: 0; color: #111111; }
.turn-ai .content li { margin: 2px 0; }
.turn-ai .content hr {
  border: none;
  border-top: 1px solid #d0d5dd;
  margin: 10px 0;
}
.turn-ai .content blockquote {
  border-left: 3px solid #cc0000;
  margin: 6px 0;
  padding: 4px 10px;
  color: #555555;
  background: rgba(200,0,0,.05);
  border-radius: 0 6px 6px 0;
  font-style: italic;
}
.turn-ai .content table {
  border-collapse: collapse;
  width: 100%;
  margin: 8px 0;
  font-size: 12.5px;
}
.turn-ai .content th {
  background: var(--purple);
  color: #ffffff;
  font-weight: 700;
  text-align: left;
  padding: 6px 9px;
  border: 1px solid #b0b8c4;
  white-space: nowrap;
}
.turn-ai .content td {
  padding: 5px 9px;
  border: 1px solid #d0d5dd;
  vertical-align: top;
  color: #111111;
}
.turn-ai .content tr:nth-child(even) td { background: #f0f4f8; }
.turn-ai .content td strong { color: #cc0000; }
.turn-ai .content pre[data-lang]::before {
  content: attr(data-lang);
  display: block;
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}

/* ── Feature result card (CodeSec / CVE / LQL injected into log) ─────────── */
.result-card {
  margin: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface2);
  animation: fadein .15s ease;
}
.result-card-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
}
.result-card-icon { font-size: 13px; }
.result-card-title { color: var(--text); font-size: 12px; font-weight: 600; flex: 1; }
.rc-actions { display: flex; gap: 4px; margin-left: auto; }
.rc-copy-btn {
  font: 600 10px/1 var(--sans);
  padding: 3px 7px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: color .1s, background .1s;
  line-height: 1.4;
}
.rc-copy-btn:hover { color: var(--text); background: var(--surface3); }
/* Footer strip below scrollable body — keeps copy btn always visible */
.rc-footer {
  display: flex;
  justify-content: flex-end;
  padding: 4px 8px 6px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  border-radius: 0 0 10px 10px;
}
/* FortiGuard search link */
.fg-search-link {
  margin-top: 6px;
  font-size: 11px;
}
.fg-search-link a {
  color: var(--purple);
  font-weight: 600;
  text-decoration: none;
}
.fg-search-link a:hover { text-decoration: underline; }

/* FortiGuard outbreak intel card */
.fg-outbreak-card {
  margin-top: 8px;
  padding: 7px 10px;
  border: 1px solid #cc0000;
  border-left: 3px solid #cc0000;
  border-radius: 6px;
  background: rgba(200,0,0,.05);
  font-size: 11px;
}
.fg-outbreak-card strong { color: #cc0000; display: block; margin-bottom: 4px; }
.fg-outbreak-item { margin: 3px 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.fg-outbreak-item a { color: var(--purple); text-decoration: none; font-weight: 600; }
.fg-outbreak-item a:hover { text-decoration: underline; }
.fg-risk { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
.fg-risk-critical { background: #cc0000; color: #fff; }
.fg-risk-high     { background: #e65c00; color: #fff; }
.fg-risk-medium   { background: #f5a623; color: #000; }
.fg-risk-low      { background: #4caf50; color: #fff; }
.fg-date { color: #888; font-size: 10px; margin-left: auto; }

/* ── Security report visual components ───────────────────────────────────── */
/* Minimal, engineering-focused: a table for resource findings + a sparing inline badge. */

/* Findings table — same visual language as .lql-table for consistency */
.rpt-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin: 8px 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.rpt-table th {
  background: var(--surface3);
  color: var(--dim);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  font-size: 9.5px;
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.rpt-table td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.rpt-table tbody tr:nth-child(even) { background: var(--surface2); }
.rpt-table tbody tr:last-child td { border-bottom: none; }

/* Severity badge — muted by default; colour reserved for critical/high only */
.rpt-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .3px;
  vertical-align: middle;
  border: 1px solid var(--border);
  color: var(--muted);
}
.rpt-badge.critical { background: #ee3124; color: #fff; border-color: #ee3124; }
.rpt-badge.high     { background: #e65c00; color: #fff; border-color: #e65c00; }

/* Risk matrix — 5×5 heat grid */
.rpt-matrix {
  margin: 8px 0;
  font-size: 10px;
}
.rpt-matrix-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 4px;
}
.rpt-matrix table {
  border-collapse: collapse;
  width: 100%;
}
.rpt-matrix th {
  background: transparent !important;
  color: var(--muted) !important;
  font-size: 9px !important;
  font-weight: 600 !important;
  padding: 3px 4px !important;
  text-align: center !important;
  border: none !important;
  white-space: nowrap;
}
.rpt-matrix td {
  width: 18%;
  height: 28px;
  text-align: center;
  font-size: 9px;
  font-weight: 600;
  border: 2px solid var(--bg) !important;
  border-radius: 3px;
  vertical-align: middle !important;
  padding: 2px !important;
  cursor: default;
}
.rpt-matrix td.cell-low    { background: #2d5a27; color: #a3e8a0; }
.rpt-matrix td.cell-med    { background: #6b4c10; color: #fcd68a; }
.rpt-matrix td.cell-high   { background: #7a2a10; color: #ffb899; }
.rpt-matrix td.cell-crit   { background: #7a1010; color: #ffaaaa; }
.rpt-matrix td.cell-active { outline: 2px solid #fff; outline-offset: -3px; font-size: 11px; }

/* Section wrapper with left-accent bar — used sparingly for a single decision line */
.rpt-section {
  margin: 10px 0;
  padding: 8px 10px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--dim);
  border-radius: 0 8px 8px 0;
  font-size: 11.5px;
  color: var(--text);
}

/* Horizontal divider with label */
.rpt-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 10px 0 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
}
.rpt-divider::before, .rpt-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Radar/spider chart — visual risk profile in the CVE "Critical Context" section (new, additive) */
.rpt-radar {
  margin: 8px 0;
  padding: 8px 6px 4px;
  background: #fff;
  border: 1px solid #d0d5dd;
  border-radius: 6px;
}
.rpt-radar-title {
  font-size: 10px;
  font-weight: 700;
  color: #555;
  text-transform: uppercase;
  letter-spacing: .4px;
  text-align: center;
  margin-bottom: 2px;
}

/* AI bubble copy btn — sits below the bubble */
.turn-ai .bubble-col .rc-copy-btn,
.turn-ai .bubble-col .rc-pdf-btn,
.turn-ai .content .rc-copy-btn,
.turn-ai .content .rc-pdf-btn {
  display: inline-block;
  margin-top: 4px;
  margin-right: 4px;
  align-self: flex-start;
}
.rc-pdf-btn {
  background: var(--purple) !important;
  color: #fff !important;
  border-color: var(--purple) !important;
}
.rc-pdf-btn:hover {
  background: #7c4fc0 !important;
  color: #fff !important;
}
.cs-result-body, .cve-result-body, .lql-result-body {
  padding: 8px 12px;
  max-height: 320px;
  overflow-y: auto;
}
.cs-result-body::-webkit-scrollbar,
.cve-result-body::-webkit-scrollbar,
.lql-result-body::-webkit-scrollbar { width: 3px; }
.cs-result-body::-webkit-scrollbar-thumb,
.cve-result-body::-webkit-scrollbar-thumb,
.lql-result-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── GitHub scan card ────────────────────────────────────────────────────── */
.gh-card {
  margin: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface2);
  font-size: 11px;
  animation: fadein .15s ease;
}
.gh-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
}
.gh-icon { font-size: 13px; color: var(--accent); flex-shrink: 0; }
.gh-repo {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  text-decoration: none;
  flex: 1;
}
.gh-repo strong { color: var(--accent); font-weight: 700; }
.gh-repo:hover  { color: var(--accent); }
.gh-branch {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
}
.gh-count {
  font-size: 10px;
  font-weight: 700;
  color: var(--ok);
  background: var(--ok-bg);
  border-radius: 10px;
  padding: 1px 7px;
  white-space: nowrap;
}
.gh-files {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 160px;
  overflow-y: auto;
}
.gh-files::-webkit-scrollbar { width: 3px; }
.gh-files::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.gh-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 3px;
}
.gh-dir {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-right: 1px;
}
.gh-file {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
}

.cursor {
  display: inline-block;
  width: 2px; height: 14px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .85s step-end infinite;
}
.search-marker {
  color: var(--dim);
  font-style: italic;
  font-size: 0.85em;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input area ──────────────────────────────────────────────────────────── */
#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 9px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 0;
}
#prompt {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  resize: none;
  min-height: 38px;
  max-height: 160px;
  background: var(--surface2);
  color: var(--text);
  line-height: 1.5;
  transition: border-color .15s;
}
#prompt:focus { border-color: var(--accent); }
#prompt::placeholder { color: var(--dim); }
#send {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, opacity .15s;
}
#send:hover:not(:disabled) { background: var(--accent-d); }
#send:disabled { opacity: .35; cursor: not-allowed; }

/* ── Footer ──────────────────────────────────────────────────────────────── */
#hint {
  display: flex;
  justify-content: space-between;
  padding: 3px 14px;
  font-size: 10px;
  color: var(--dim);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="config-bar">
  <label for="url-input" style="display:none">url</label>
  <input id="url-input" type="url" placeholder="https://bifrost.xxx" autocomplete="off" style="display:none" />
  <label id="key-label" for="key-input" style="display:none">key</label>
  <input id="key-input" type="password" placeholder="sk-bf-…" autocomplete="off" style="display:none" />
  <input id="key2-input" type="hidden" />
</div>

<div id="action-bar">
  <button id="read-page" class="chip"         title="Read current page into context">📖 Read</button>
  <button id="tldr"      class="chip"         title="Summarize current page">📝 TL;DR</button>
  <div class="sep"></div>
  <div id="fcnapp-wrap">
    <button id="fcnapp-btn" class="chip accent" title="FortiCNAPP tools"> FortiCNAPP <span class="caret">▼</span></button>
    <div id="fcnapp-menu">
      <button id="codesec"    class="fcnapp-item accent"  title="SCA + SAST scan on code found on this page&#10;&#10;SAST languages: Go, Java, JavaScript, PHP, Python, TypeScript&#10;&#10;SCA languages: .NET (deps.json, packages.lock.json), C/C++ (conan.lock), Go (go.mod, go.sum), Java (Gradle, Maven, Bazel), Node.js (package-lock.json, pnpm-lock.yaml, yarn.lock), PHP (composer.lock), Python (requirements.txt, Pipfile.lock, poetry.lock, uv.lock), Ruby (Gemfile.lock), Rust (Cargo.lock)"> CodeScan</button>
      <button id="sbom" class="fcnapp-item accent" title="Generate SBOM — choose format before generating"> SBOM Gen</button>
      <button id="compliance" class="fcnapp-item success" title="Generate compliance PDF report"> Compliance Report</button>
      <button id="lql"        class="fcnapp-item accent"  title="Run LQL queries against your tenant"> Risk Hunting</button>
      <button id="cve-btn"    class="fcnapp-item danger"  title="CVE attack surface across hosts &amp; containers"> Unified Attack Threat Surface</button>
    </div>
  </div>
  <button id="faz-btn" class="chip lw-disabled" title="FortiAnalyzer — coming soon. Correlated SOC analytics across the Security Fabric.">📈 FAZ</button>
  <button id="forticasb-btn" class="chip lw-disabled" title="FortiCASB-SSPM — coming soon. SaaS security posture: Shadow IT discovery, OAuth app risk, M365/GWS/Salesforce posture.">☁️ FortiCASB-SSPM</button>
  <div class="sep"></div>
  <div id="admin-wrap">
    <button id="admin-btn" class="chip" title="Gateway, model, TokenIQ, community"><span id="routing-dot" class="admin-dot"></span> Admin <span class="caret">▼</span></button>
    <div id="admin-menu">
      <div class="admin-menu-label">AI Gateway</div>
      <select id="gateway" class="admin-select" title="AI Gateway">
        <option value="bifrost">⚡ Bifrost</option>
        <option value="portkey">Portkey</option>
        <option value="litellm">LiteLLM</option>
        <option value="helicone">Helicone</option>
      </select>
      <div class="admin-menu-label">LLM Model</div>
      <select id="model" class="admin-select">
        <option value="claude-haiku-4-5" selected>haiku-4-5 ⚡</option>
        <option value="claude-sonnet-4-6">sonnet-4-6</option>
        <option value="claude-opus-4-8">opus-4-8</option>
        <option value="deepseek-v4-flash">deepseek-v4-flash ⚡</option>
        <option value="deepseek-v4-pro">deepseek-v4-pro</option>
      </select>
      <div class="fcnapp-sep"></div>
      <span id="routing-badge" class="admin-item headroom-badge" style="display:none"></span>
      <button id="dashboard-token" class="fcnapp-item admin-item" title="Open TokenIQ token-savings dashboard">📊 TokenIQ Dashboard</button>
      <div class="fcnapp-sep"></div>
      <button id="fcnapp-community" class="fcnapp-item admin-item" title="FortiCNAPP Community — blogs &amp; articles">💬 Community Feed</button>
    </div>
  </div>
  <span id="status">—</span>
  <button id="clear"      class="chip">✕ Clear</button>
</div>

<div id="codesec-panel" class="drawer">
  <div class="drawer-header">
    <span id="codesec-panel-title"> FortiCNAPP CodeSec</span>
    <span class="drawer-close" id="codesec-close">✕</span>
  </div>
  <div id="codesec-body"></div>
</div>

<div id="compliance-panel" class="drawer">
  <div class="drawer-header">
    <span>📋 Compliance Report</span>
    <span class="drawer-close" id="compliance-close">✕</span>
  </div>
  <div class="drawer-body">
    <select id="comp-report" class="drawer-select" style="flex:1;min-width:180px"><option value="">Loading reports…</option></select>
    <button id="comp-generate" class="drawer-btn primary">⬇ Generate PDF</button>
    <span id="comp-status" class="drawer-status"></span>
  </div>
</div>

<div id="cve-panel" class="drawer">
  <div class="drawer-header">
    <span>🚨 Unified Attack Threat Surface</span>
    <span class="drawer-close" id="cve-close">✕</span>
  </div>
  <div class="drawer-body">
    <input id="cve-input" class="drawer-input" type="text" placeholder="CVE-2021-44228" autocomplete="off" spellcheck="false" />
    <select id="cve-days" class="drawer-select" style="flex:0;min-width:0;width:90px" title="Wider windows are split into 7-day chunks server-side and merged">
      <option value="7"  selected>7 days</option>
      <option value="14">14 days</option>
      <option value="30">30 days</option>
    </select>
    <button id="cve-search"  class="drawer-btn primary">🔎 Search</button>
    <button id="cve-analyse" class="drawer-btn secondary" style="display:none">🤖 Analyse</button>
    <span id="cve-status" class="drawer-status"></span>
  </div>
  <div id="cve-results" class="drawer-results"></div>
</div>

<div id="lql-panel" class="drawer">
  <div class="drawer-header">
    <span>Risk Hunting</span>
    <span class="drawer-close" id="lql-close">✕</span>
  </div>
  <div class="lql-tabs">
    <div class="lql-tab active" data-tab="saved">LQL</div>
    <div class="lql-tab" data-tab="generate">✨ Assisted Investigation</div>
  </div>

  <div class="lql-pane active" id="lql-pane-saved">
    <div class="drawer-body" id="lql-body">
      <select id="lql-select" class="drawer-select"><option value="">Loading queries…</option></select>
      <button id="lql-run" class="drawer-btn primary">▶ Run</button>
      <span id="lql-status" class="drawer-status"></span>
    </div>
    <div id="lql-results" class="drawer-results"></div>
  </div>

  <div class="lql-pane" id="lql-pane-generate">
    <div class="drawer-body">
      <input id="lql-objective" class="drawer-input" type="text"
             placeholder="e.g. S3 buckets without encryption"
             autocomplete="off" style="flex:1;min-width:160px" />
      <button id="lql-gen-btn" class="drawer-btn primary">▶ Run Query</button>
      <span id="lql-gen-status" class="drawer-status"></span>
      <span id="lql-gen-boat" class="lql-boat" title="Working hard…">⛵</span>
      <div id="lql-gen-wake-trail"></div>
    </div>
    <div id="lql-gen-results"></div>
  </div>
</div>

<div id="log-tabs">
  <button class="log-tab active" data-pane="latest">Latest</button>
  <button class="log-tab"        data-pane="all">History</button>
</div>

<div id="log-latest" class="log-pane active"></div>
<div id="log-all"    class="log-pane"></div>

<div id="input-row">
  <textarea id="prompt" placeholder="Ask me anything…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<div id="hint">
  <span>shift+enter: newline</span>
  <span id="token-info"></span>
</div>

<!-- SBOM format picker — at body level so it's never clipped by #fcnapp-menu -->
<div id="sbom-picker">
  <div class="sbom-picker-title">📦 SBOM Format</div>

  <div class="sbom-fmt-group">
    <div class="sbom-fmt-group-label">Lacework</div>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="lw-json" checked><span>lw-json<em>default</em></span></label>
  </div>

  <div class="sbom-fmt-group">
    <div class="sbom-fmt-group-label">CycloneDX</div>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="cdx-json"><span>cdx-json</span></label>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="cdx-xml"><span>cdx-xml</span></label>
  </div>

  <div class="sbom-fmt-group">
    <div class="sbom-fmt-group-label">SPDX</div>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="spdx-json"><span>spdx-json</span></label>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="spdx-tag"><span>spdx-tag</span></label>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="spdx-yaml"><span>spdx-yaml</span></label>
  </div>

  <div class="sbom-fmt-group">
    <div class="sbom-fmt-group-label">SARIF</div>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="sarif"><span>sarif</span></label>
  </div>

  <div class="sbom-fmt-group">
    <div class="sbom-fmt-group-label">GitLab</div>
    <label class="sbom-fmt-option"><input type="radio" name="sbom-fmt" value="gitlab-json"><span>gitlab-json</span></label>
  </div>

  <div class="sbom-picker-go">
    <button id="sbom-cancel">Cancel</button>
    <button id="sbom-generate">Generate →</button>
  </div>
</div>

<script src="panel.js"></script>
</body>
</html>
