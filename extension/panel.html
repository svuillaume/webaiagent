<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web AI Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: -apple-system, "Segoe UI", system-ui, sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;

  --bg:         #0f1117;
  --surface:    #181b22;
  --surface2:   #1f232d;
  --surface3:   #272b36;
  --border:     #2a2e3d;
  --dim:        #4a5166;
  --text:       #e2e5ef;
  --muted:      #7b859a;
  --accent:     #ee3124;
  --accent-d:   #c41230;
  --accent-bg:  rgba(238,49,36,.08);
  --ok:         #34d399;
  --ok-bg:      rgba(52,211,153,.08);
  --warn:       #fbbf24;
  --err:        #f87171;
  --err-bg:     rgba(248,113,113,.08);
  --blue:       #60a5fa;
  --blue-bg:    rgba(96,165,250,.08);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #f5f6f8;
    --surface3:   #eceef2;
    --border:     #d4d8e2;
    --dim:        #9aa0b0;
    --text:       #1a1d2e;
    --muted:      #5a6070;
    --accent:     #ee3124;
    --accent-d:   #c41230;
    --accent-bg:  rgba(238,49,36,.06);
    --ok:         #059669;
    --ok-bg:      rgba(5,150,105,.06);
    --warn:       #d97706;
    --err:        #dc2626;
    --err-bg:     rgba(220,38,38,.06);
    --blue:       #2563eb;
    --blue-bg:    rgba(37,99,235,.06);
  }
}

html, body { height: 100%; width: 100%; }

body {
  font-family: var(--sans);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Row 1: Config bar ───────────────────────────────────────────────────── */
#config-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  margin-right: 6px;
}

#config-bar label {
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}

#config-bar input, #config-bar select {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}
#config-bar input:focus, #config-bar select:focus { border-color: var(--accent); }
#gateway   { width: 88px;  font-family: var(--sans); font-size: 11px; }
#url-input { width: 150px; }
#key-input { width: 110px; }
#model     { width: 138px; font-family: var(--sans); font-size: 11px; }

/* Status dot: ::before so setStatus(text, cls) works unchanged */
#status {
  margin-left: auto;
  font-size: 10px;
  color: var(--dim);
  transition: color .2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
#status::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
#status.ok   { color: var(--ok); }
#status.ok::before   { background: var(--ok); }
#status.err  { color: var(--err); }
#status.err::before  { background: var(--err); }
#status.busy { color: var(--muted); }
#status.busy::before { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
@keyframes fg-flash { 0%,100% { background: var(--surface2); color: var(--text); border-color: var(--border); }
  50% { background: var(--err-bg); color: var(--err); border-color: rgba(248,113,113,.4); } }
#fortiguard-feed.fg-alert { animation: fg-flash 1.4s ease-in-out infinite; }

/* ── Row 2: Action bar ───────────────────────────────────────────────────── */
#action-bar {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 5px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
#action-bar::-webkit-scrollbar { display: none; }

.sep {
  width: 1px;
  height: 14px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 3px;
}

/* Pill chip buttons */
.chip {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  transition: color .12s, background .12s, border-color .12s;
  line-height: 1;
}
.chip:hover           { color: var(--text);    background: var(--surface3); border-color: var(--border); }
.chip:disabled        { opacity: .3; cursor: not-allowed; }
.chip.lw-disabled     { opacity: .35; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
.chip.lw-disabled:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
.chip.active          { color: var(--ok);      background: var(--ok-bg);    border-color: rgba(52,211,153,.25); }
.chip.busy            { color: var(--dim);     background: transparent;     cursor: wait; }
.chip.accent:hover    { color: var(--accent);  background: var(--accent-bg);border-color: rgba(238,49,36,.25); }
.chip.success:hover   { color: var(--ok);      background: var(--ok-bg);    border-color: rgba(52,211,153,.25); }
.chip.danger:hover    { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }
.chip.danger.active   { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }
#clear                { margin-left: auto; }
#clear:hover          { color: var(--err);     background: var(--err-bg);   border-color: rgba(248,113,113,.3); }

/* ── FortiCNAPP dropdown ─────────────────────────────────────────────────── */
#fcnapp-wrap { position: relative; flex-shrink: 0; }
#fcnapp-btn  { gap: 5px; }
#fcnapp-btn .caret { font-size: 8px; opacity: .6; transition: transform .15s; }
#fcnapp-btn.open .caret { transform: rotate(180deg); }
#fcnapp-menu {
  display: none;
  position: fixed;
  z-index: 200;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  min-width: 150px;
  box-shadow: 0 4px 16px rgba(0,0,0,.35);
}
#fcnapp-menu.open { display: flex; flex-direction: column; gap: 2px; }
.fcnapp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  border: none;
  background: transparent;
  white-space: nowrap;
  width: 100%;
  text-align: left;
  transition: background .1s, color .1s;
}
.fcnapp-item:hover        { background: var(--surface3); }
.fcnapp-item.lw-disabled  { opacity: .35; cursor: not-allowed; filter: grayscale(1); pointer-events: none; }
.fcnapp-item.accent:hover { color: var(--accent); background: var(--accent-bg); }
.fcnapp-item.success:hover{ color: var(--ok);     background: var(--ok-bg); }
.fcnapp-item.danger:hover { color: var(--err);    background: var(--err-bg); }

/* ── Drawers (shared) ────────────────────────────────────────────────────── */
.drawer {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 360px;
}
.drawer.open { display: flex; }
#lql-panel { max-height: 55vh; }

.drawer-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
  flex-shrink: 0;
}
.drawer-close {
  margin-left: auto;
  cursor: pointer;
  color: var(--dim);
  font-size: 13px;
  line-height: 1;
  transition: color .12s;
  user-select: none;
}
.drawer-close:hover { color: var(--err); }

.drawer-body {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  flex-shrink: 0;
}

.drawer-input {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 9px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}
.drawer-input:focus { border-color: var(--accent); }

.drawer-select {
  font-family: var(--sans);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 9px;
  border-radius: 6px;
  outline: none;
  flex: 1;
  min-width: 160px;
}
.drawer-select:focus { border-color: var(--accent); }

.drawer-btn {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: filter .12s, opacity .12s;
  white-space: nowrap;
}
.drawer-btn:hover:not(:disabled) { filter: brightness(1.12); }
.drawer-btn:disabled { opacity: .4; cursor: wait; }
.drawer-btn.primary   { background: var(--accent); color: #fff; }
.drawer-btn.secondary {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.drawer-btn.secondary:hover { color: var(--text); border-color: var(--muted); }

.drawer-status { font-size: 10px; color: var(--dim); }
.drawer-status.ok  { color: var(--ok); }
.drawer-status.err { color: var(--err); }

.drawer-results {
  flex: 1;
  overflow: auto;
  padding: 0 14px 12px;
}
.drawer-results::-webkit-scrollbar { width: 6px; }
.drawer-results::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
.drawer-results::-webkit-scrollbar-track { background: var(--surface2); }

/* ── CodeSec drawer ──────────────────────────────────────────────────────── */
#codesec-panel .drawer-header { color: var(--accent); }
#codesec-body { padding: 10px 14px; overflow-y: auto; max-height: 300px; }

.cs-section-title {
  font-size: 9px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin: 12px 0 5px;
}
.cs-section-title:first-child { margin-top: 0; }
.cs-row {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 3px 8px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
  align-items: start;
}
.cs-fix-btn {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 3px;
  font-size: 9px;
  padding: 1px 5px;
  cursor: pointer;
  white-space: nowrap;
  margin-top: 1px;
}
.cs-fix-btn:hover { background: var(--accent); color: #fff; }
.cs-row:last-child { border-bottom: none; }
.cs-sev {
  font-weight: 700;
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: .4px;
  padding-top: 1px;
}
.cs-sev.critical { color: #f87171; }
.cs-sev.high     { color: #fb923c; }
.cs-sev.medium   { color: #fbbf24; }
.cs-sev.low      { color: var(--muted); }
.cs-detail       { color: var(--text); font-size: 11px; }
.cs-detail .cs-sub { color: var(--muted); font-size: 10px; }
.cs-empty { color: var(--ok); padding: 6px 0; font-size: 11px; }
.cs-sbom-actions { display: flex; gap: 8px; padding: 6px 0 2px; }
.cs-sbom-btn {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: color .12s, border-color .12s;
}
.cs-sbom-btn:hover { color: var(--accent); border-color: rgba(238,49,36,.4); }

/* ── Compliance drawer ───────────────────────────────────────────────────── */
#compliance-panel .drawer-header { color: var(--ok); }

/* ── CVE drawer ──────────────────────────────────────────────────────────── */
#cve-panel { max-height: 440px; }
#cve-panel .drawer-header { color: var(--err); }
#cve-input { text-transform: uppercase; width: 152px; }
#cve-input:focus { border-color: var(--err); }
#cve-search { background: var(--err); }

.cve-summary {
  font-size: 11px;
  color: var(--muted);
  padding: 4px 0 10px;
}
.cve-host {
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-left-color .15s;
}
.cve-host.exposed { border-left-color: var(--err); }
.cve-host-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface2);
  flex-wrap: wrap;
}
.cve-host-name {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text);
}
.cve-badge {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.cve-badge.internet  { background: var(--err-bg);  color: var(--err);  }
.cve-badge.container { background: var(--blue-bg); color: var(--blue); }
.cve-badge.critical  { background: rgba(248,113,113,.14); color: #f87171; }
.cve-badge.high      { background: rgba(251,146,60,.14);  color: #fb923c; }
.cve-risk { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--dim); }
.cve-host-body { padding: 6px 10px; }
.cve-row { display: flex; gap: 8px; padding: 2px 0; font-size: 10px; }
.cve-row .cve-label {
  color: var(--dim); width: 66px; flex-shrink: 0;
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .4px; padding-top: 1px;
}
.cve-row .cve-val { color: var(--text); font-family: var(--mono); }
.cve-row .cve-val.fix { color: var(--ok); }
.cve-containers { margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border); }

/* ── LQL drawer ──────────────────────────────────────────────────────────── */
#lql-panel .drawer-header { color: var(--accent); }

/* LQL HTML table */
.lql-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin: 0;
}

.lql-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--mono);
  line-height: 1.45;
}

.lql-table thead th {
  position: sticky;
  top: 0;
  background: var(--surface3);
  color: var(--dim);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  font-size: 9.5px;
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.lql-table tbody tr:nth-child(even) { background: var(--surface2); }
.lql-table tbody tr:hover { background: var(--accent-bg); }

.lql-table tbody td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.lql-table tbody tr:last-child td { border-bottom: none; }

.lql-table a.lql-link {
  color: var(--accent);
  text-decoration: none;
}
.lql-table a.lql-link:hover { text-decoration: underline; }

.lql-export-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0 7px;
}

.lql-export-btn {
  font: 600 10px/1 var(--sans);
  letter-spacing: .04em;
  text-transform: uppercase;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 9px;
  cursor: pointer;
  transition: background .12s, color .12s;
}
.lql-export-btn:hover { background: var(--surface3); color: var(--text); }

.lql-row-note {
  font-size: 10px;
  color: var(--dim);
  font-style: italic;
}

#lql-gen-preview pre {
  font-family: var(--mono);
  font-size: 10.5px;
  white-space: pre;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  line-height: 1.5;
  margin: 0;
}

/* LQL tabs */
.lql-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.lql-tab {
  font-size: 11px;
  font-weight: 500;
  padding: 6px 14px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color .12s, border-color .12s;
  user-select: none;
}
.lql-tab:hover { color: var(--text); }
.lql-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.lql-pane { display: none; }
.lql-pane.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }

/* ── Chat log tabs ───────────────────────────────────────────────────────── */
#log-tabs {
  display: flex;
  gap: 2px;
  padding: 5px 10px 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.log-tab {
  font: 600 10px/1 var(--sans);
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 5px 12px 6px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: color .12s, border-color .12s;
  border-radius: 4px 4px 0 0;
}
.log-tab:hover  { color: var(--text); }
.log-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Chat log panes ──────────────────────────────────────────────────────── */
.log-pane {
  display: none;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  flex-direction: column;
  padding: 8px 0 4px;
  gap: 2px;
}
.log-pane.active {
  display: flex;
}
.log-pane::-webkit-scrollbar { width: 3px; }
.log-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Session boundary marker shown in History tab */
.session-sep {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  text-align: center;
  padding: 6px 0 2px;
  border-top: 1px solid var(--border);
  margin: 4px 14px 0;
}

@keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

/* ── Bubble rows ── */
.turn {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  padding: 2px 10px;
  animation: fadein .15s ease;
}
.turn-user   { flex-direction: row-reverse; }
.turn-ai     { flex-direction: row; }
.turn-system { flex-direction: row; justify-content: center; padding: 3px 14px; }

/* ── Avatar ── */
.role {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 800;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: .3px;
  user-select: none;
  margin-bottom: 2px;
}
.role.user   { background: var(--accent);   color: #fff; }
.role.ai     { background: #2563eb;          color: #fff; }
.role.system { display: none; }

/* ── Bubbles ── */
.content {
  padding: 9px 12px;
  border-radius: 14px;
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 12.5px;
  line-height: 1.6;
  min-width: 0;
  white-space: pre-wrap;
}
.turn-user .content {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.turn-ai .content {
  background: #1e2a3a;
  color: #e2e8f4;
  border-bottom-left-radius: 4px;
  border: 1px solid #2d3f55;
  position: relative;
  padding-bottom: 26px;
}
@media (prefers-color-scheme: light) {
  .turn-ai .content { background: #f0f5ff; color: #1a2540; border-color: #c7d6f0; position: relative; padding-bottom: 26px; }
}
.turn-system .content {
  background: #1a1f14;
  color: #7daf6a;
  font-size: 10.5px;
  font-family: var(--mono);
  padding: 3px 10px;
  border: 1px solid #2e3d24;
  border-radius: 6px;
  max-width: 95%;
  text-align: center;
}

/* ── Sender label above bubble ── */
.turn-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--dim);
  padding: 0 4px;
  margin-bottom: 1px;
  user-select: none;
}
.turn-user .turn-label  { text-align: right; color: var(--accent); }
.turn-ai   .turn-label  { text-align: left;  color: #2563eb; }

/* ── Bubble + label wrapper ── */
.bubble-col {
  display: flex;
  flex-direction: column;
  max-width: 82%;
}
.turn-user .bubble-col { align-items: flex-end; }
.turn-ai   .bubble-col { flex: 1; min-width: 0; max-width: none; align-items: flex-start; }

.content code {
  font-family: var(--mono);
  font-size: 11px;
  background: rgba(255,255,255,.15);
  color: inherit;
  padding: 1px 5px;
  border-radius: 4px;
}
.turn-ai .content code {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.content pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 9px 12px;
  overflow-x: auto;
  margin: 6px 0;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre;
  color: var(--text);
}
.turn-user .content pre { border-left-color: rgba(255,255,255,.4); }
.content pre code { background: none; padding: 0; color: inherit; }
a.ext-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
a.ext-link:hover { color: var(--accent-d); }

/* ── Feature result card (CodeSec / CVE / LQL injected into log) ─────────── */
.result-card {
  margin: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface2);
  animation: fadein .15s ease;
}
.result-card-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
}
.result-card-icon { font-size: 13px; }
.result-card-title { color: var(--text); font-size: 12px; font-weight: 600; flex: 1; }
.rc-actions { display: flex; gap: 4px; margin-left: auto; }
.rc-copy-btn {
  font: 600 10px/1 var(--sans);
  padding: 3px 7px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: color .1s, background .1s;
  line-height: 1.4;
}
.rc-copy-btn:hover { color: var(--text); background: var(--surface3); }
/* Footer strip below scrollable body — keeps copy btn always visible */
.rc-footer {
  display: flex;
  justify-content: flex-end;
  padding: 4px 8px 6px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  border-radius: 0 0 10px 10px;
}
/* AI bubble copy btn stays absolute bottom-right inside the bubble */
.turn-ai .content .rc-copy-btn {
  position: absolute;
  bottom: 6px;
  right: 8px;
}
.cs-result-body, .cve-result-body, .lql-result-body {
  padding: 8px 12px;
  max-height: 320px;
  overflow-y: auto;
}
.cs-result-body::-webkit-scrollbar,
.cve-result-body::-webkit-scrollbar,
.lql-result-body::-webkit-scrollbar { width: 3px; }
.cs-result-body::-webkit-scrollbar-thumb,
.cve-result-body::-webkit-scrollbar-thumb,
.lql-result-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── GitHub scan card ────────────────────────────────────────────────────── */
.gh-card {
  margin: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface2);
  font-size: 11px;
  animation: fadein .15s ease;
}
.gh-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 12px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
}
.gh-icon { font-size: 13px; color: var(--accent); flex-shrink: 0; }
.gh-repo {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  text-decoration: none;
  flex: 1;
}
.gh-repo strong { color: var(--accent); font-weight: 700; }
.gh-repo:hover  { color: var(--accent); }
.gh-branch {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
}
.gh-count {
  font-size: 10px;
  font-weight: 700;
  color: var(--ok);
  background: var(--ok-bg);
  border-radius: 10px;
  padding: 1px 7px;
  white-space: nowrap;
}
.gh-files {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 160px;
  overflow-y: auto;
}
.gh-files::-webkit-scrollbar { width: 3px; }
.gh-files::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
.gh-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 3px;
}
.gh-dir {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-right: 1px;
}
.gh-file {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
}

.cursor {
  display: inline-block;
  width: 2px; height: 14px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .85s step-end infinite;
}
.search-marker {
  color: var(--dim);
  font-style: italic;
  font-size: 0.85em;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input area ──────────────────────────────────────────────────────────── */
#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 9px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 0;
}
#prompt {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  resize: none;
  min-height: 38px;
  max-height: 160px;
  background: var(--surface2);
  color: var(--text);
  line-height: 1.5;
  transition: border-color .15s;
}
#prompt:focus { border-color: var(--accent); }
#prompt::placeholder { color: var(--dim); }
#send {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, opacity .15s;
}
#send:hover:not(:disabled) { background: var(--accent-d); }
#send:disabled { opacity: .35; cursor: not-allowed; }

/* ── Footer ──────────────────────────────────────────────────────────────── */
#hint {
  display: flex;
  justify-content: space-between;
  padding: 3px 14px;
  font-size: 10px;
  color: var(--dim);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="config-bar">
  <select id="gateway" title="AI Gateway">
    <option value="bifrost">⚡ Bifrost</option>
    <option value="portkey">Portkey</option>
    <option value="litellm">LiteLLM</option>
    <option value="helicone">Helicone</option>
  </select>
  <label for="url-input" style="display:none">url</label>
  <input id="url-input" type="url" placeholder="https://bifrost.xxx" autocomplete="off" style="display:none" />
  <label id="key-label" for="key-input" style="display:none">key</label>
  <input id="key-input" type="password" placeholder="sk-bf-…" autocomplete="off" style="display:none" />
  <input id="key2-input" type="hidden" />
  <select id="model">
    <option value="claude-haiku-4-5" selected>haiku-4-5 ⚡</option>
    <option value="claude-sonnet-4-6">sonnet-4-6</option>
    <option value="claude-opus-4-8">opus-4-8</option>
    <option value="deepseek-v4-flash">deepseek-v4-flash ⚡</option>
    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
  </select>
  <span id="status">—</span>
</div>

<div id="action-bar">
  <button id="read-page" class="chip"         title="Read current page into context"> Read</button>
  <button id="tldr"      class="chip"         title="Summarize current page">TL;DR</button>
  <div class="sep"></div>
  <button id="fortiguard-feed" class="chip" title="Open FortiGuard Labs Threat Intelligence Feed">🛡 FortiGuard</button>
  <div class="sep"></div>
  <div id="fcnapp-wrap">
    <button id="fcnapp-btn" class="chip accent" title="FortiCNAPP tools"> FortiCNAPP <span class="caret">▼</span></button>
    <div id="fcnapp-menu">
      <button id="codesec"    class="fcnapp-item accent"  title="SCA + SAST scan on code found on this page"> CodeScan</button>
      <button id="sbom"       class="fcnapp-item accent"  title="SBOM export" style="display:none"> SBOM Gen</button>
      <button id="compliance" class="fcnapp-item success" title="Generate compliance PDF report"> Compliance Report</button>
      <button id="lql"        class="fcnapp-item accent"  title="Run LQL queries against your tenant"> Advanced Analytics</button>
      <button id="cve-btn"    class="fcnapp-item danger"  title="CVE attack surface across hosts &amp; containers"> Attack Threat Surface</button>
      <button id="fcnapp-community" class="fcnapp-item" title="FortiCNAPP Community — blogs &amp; articles">💬 Community Feed</button>
    </div>
  </div>
  <button id="clear"      class="chip">✕ Clear</button>
</div>

<div id="codesec-panel" class="drawer">
  <div class="drawer-header">
    <span id="codesec-panel-title"> FortiCNAPP CodeSec</span>
    <span class="drawer-close" id="codesec-close">✕</span>
  </div>
  <div id="codesec-body"></div>
</div>

<div id="compliance-panel" class="drawer">
  <div class="drawer-header">
    <span>📋 Compliance Report</span>
    <span class="drawer-close" id="compliance-close">✕</span>
  </div>
  <div class="drawer-body">
    <select id="comp-report" class="drawer-select" style="flex:1;min-width:180px"><option value="">Loading reports…</option></select>
    <button id="comp-generate" class="drawer-btn primary">⬇ Generate PDF</button>
    <span id="comp-status" class="drawer-status"></span>
  </div>
</div>

<div id="cve-panel" class="drawer">
  <div class="drawer-header">
    <span>🚨 CVE Attack Surface</span>
    <span class="drawer-close" id="cve-close">✕</span>
  </div>
  <div class="drawer-body">
    <input id="cve-input" class="drawer-input" type="text" placeholder="CVE-2021-44228" autocomplete="off" spellcheck="false" />
    <select id="cve-days" class="drawer-select" style="flex:0;min-width:0;width:90px">
      <option value="7"  selected>7 days</option>
      <option value="14">14 days</option>
      <option value="30">30 days</option>
    </select>
    <button id="cve-search"  class="drawer-btn primary">🔎 Search</button>
    <button id="cve-analyse" class="drawer-btn secondary" style="display:none">🤖 Analyse</button>
    <span id="cve-status" class="drawer-status"></span>
  </div>
  <div id="cve-results" class="drawer-results"></div>
</div>

<div id="lql-panel" class="drawer">
  <div class="drawer-header">
    <span>🔍 LQL</span>
    <span class="drawer-close" id="lql-close">✕</span>
  </div>
  <div class="lql-tabs">
    <div class="lql-tab active" data-tab="saved">Saved queries</div>
    <div class="lql-tab" data-tab="generate">✨ Generate</div>
  </div>

  <div class="lql-pane active" id="lql-pane-saved">
    <div class="drawer-body" id="lql-body">
      <select id="lql-select" class="drawer-select"><option value="">Loading queries…</option></select>
      <button id="lql-run" class="drawer-btn primary">▶ Run</button>
      <span id="lql-status" class="drawer-status"></span>
    </div>
    <div id="lql-results" class="drawer-results"></div>
  </div>

  <div class="lql-pane" id="lql-pane-generate">
    <div class="drawer-body">
      <input id="lql-objective" class="drawer-input" type="text"
             placeholder="e.g. S3 buckets without encryption"
             autocomplete="off" style="flex:1;min-width:160px" />
      <button id="lql-gen-btn" class="drawer-btn primary">✨ Build</button>
      <span id="lql-gen-status" class="drawer-status"></span>
    </div>
    <div id="lql-gen-preview" class="drawer-results" style="display:none">
      <pre id="lql-gen-code"></pre>
      <div style="padding:8px 0 4px;display:flex;gap:8px;align-items:center">
        <button id="lql-gen-run" class="drawer-btn primary">▶ Run this query</button>
        <span id="lql-gen-run-status" class="drawer-status"></span>
      </div>
      <div id="lql-gen-results"></div>
    </div>
  </div>
</div>

<div id="log-tabs">
  <button class="log-tab active" data-pane="latest">Latest</button>
  <button class="log-tab"        data-pane="all">History</button>
</div>

<div id="log-latest" class="log-pane active"></div>
<div id="log-all"    class="log-pane"></div>

<div id="input-row">
  <textarea id="prompt" placeholder="Ask me anything…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<div id="hint">
  <span>shift+enter: newline</span>
  <span id="token-info"></span>
</div>

<script src="panel.js"></script>
</body>
</html>
