<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FortiAIScout</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sans: -apple-system, "Segoe UI", system-ui, sans-serif;
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;

  --bg:         #0f1117;
  --surface:    #181b22;
  --surface2:   #1f232d;
  --surface3:   #272b36;
  --border:     #2a2e3d;
  --dim:        #4a5166;
  --text:       #e2e5ef;
  --muted:      #7b859a;
  --accent:     #ee3124;
  --accent-d:   #c41230;
  --accent-bg:  rgba(238,49,36,.08);
  --ok:         #34d399;
  --ok-bg:      rgba(52,211,153,.08);
  --warn:       #fbbf24;
  --err:        #f87171;
  --err-bg:     rgba(248,113,113,.08);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #f5f6f8;
    --surface3:   #eceef2;
    --border:     #d4d8e2;
    --dim:        #9aa0b0;
    --text:       #1a1d2e;
    --muted:      #5a6070;
    --accent:     #ee3124;
    --accent-d:   #c41230;
    --accent-bg:  rgba(238,49,36,.06);
    --ok:         #059669;
    --ok-bg:      rgba(5,150,105,.06);
    --warn:       #d97706;
    --err:        #dc2626;
    --err-bg:     rgba(220,38,38,.06);
  }
}

html, body {
  height: 100dvh;
  font-family: var(--sans);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Config bar ── */
#config-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  margin-right: 6px;
}

#config-bar label {
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}

#config-bar input, #config-bar select {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}
#config-bar input:focus, #config-bar select:focus { border-color: var(--accent); }
#key-input   { width: 160px; }
#model-sel   { width: 138px; font-family: var(--sans); }
#tokens-sel  { width: 58px;  font-family: var(--sans); }

#status {
  margin-left: auto;
  font-size: 10px;
  color: var(--dim);
  transition: color .2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
#status::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
#status.ok   { color: var(--ok); }
#status.ok::before   { background: var(--ok); }
#status.err  { color: var(--err); }
#status.err::before  { background: var(--err); }
#status.busy { color: var(--muted); }
#status.busy::before { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* ── Chat log ── */
#log {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 8px 0 4px;
  gap: 2px;
  scroll-behavior: smooth;
}
#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@keyframes fadein { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

/* ── Bubble rows ── */
.turn {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  padding: 2px 10px;
  animation: fadein .15s ease;
}
.turn-user   { flex-direction: row-reverse; }
.turn-ai     { flex-direction: row; }
.turn-system { flex-direction: row; justify-content: center; padding: 3px 14px; }

/* ── Avatar ── */
.role {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 800;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: .3px;
  user-select: none;
  margin-bottom: 2px;
}
.role.user   { background: var(--accent); color: #fff; }
.role.ai     { background: #2563eb;       color: #fff; }
.role.system { display: none; }

/* ── Bubble + label wrapper ── */
.bubble-col {
  display: flex;
  flex-direction: column;
  max-width: 82%;
}
.turn-user .bubble-col { align-items: flex-end; }
.turn-ai   .bubble-col { flex: 1; min-width: 0; max-width: none; align-items: flex-start; }

.turn-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--dim);
  padding: 0 4px;
  margin-bottom: 1px;
  user-select: none;
}
.turn-user .turn-label { text-align: right; color: var(--accent); }
.turn-ai   .turn-label { text-align: left;  color: #2563eb; }

/* ── Bubbles ── */
.content {
  padding: 9px 12px;
  border-radius: 14px;
  word-break: break-word;
  overflow-wrap: anywhere;
  font-size: 12.5px;
  line-height: 1.6;
  min-width: 0;
  white-space: pre-wrap;
  position: relative;
}
.turn-user .content {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.turn-ai .content {
  background: #1e2a3a;
  color: #e2e8f4;
  border-bottom-left-radius: 4px;
  border: 1px solid #2d3f55;
  padding-bottom: 26px;
}
@media (prefers-color-scheme: light) {
  .turn-ai .content { background: #f0f5ff; color: #1a2540; border-color: #c7d6f0; }
}
.turn-system .content {
  background: #1a1f14;
  color: #7daf6a;
  font-size: 10.5px;
  font-family: var(--mono);
  padding: 3px 10px;
  border: 1px solid #2e3d24;
  border-radius: 6px;
  max-width: 95%;
  text-align: center;
}

/* ── Inline code & pre ── */
.content code {
  font-family: var(--mono);
  font-size: 11px;
  background: rgba(255,255,255,.15);
  color: inherit;
  padding: 1px 5px;
  border-radius: 4px;
}
.turn-ai .content code {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.content pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 9px 12px;
  overflow-x: auto;
  margin: 6px 0;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre;
  color: var(--text);
}
.turn-user .content pre { border-left-color: rgba(255,255,255,.4); }
.content pre code { background: none; padding: 0; color: inherit; }

/* ── Copy button (AI bubble) ── */
.rc-copy-btn {
  font: 600 10px/1 var(--sans);
  padding: 3px 7px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: color .1s, background .1s;
}
.rc-copy-btn:hover { color: var(--text); background: var(--surface3); }
.turn-ai .content .rc-copy-btn {
  position: absolute;
  bottom: 6px;
  right: 8px;
}

/* ── Streaming cursor ── */
.cursor {
  display: inline-block;
  width: 2px; height: 13px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .7s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input bar ── */
#input-wrap {
  padding: 10px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#input-inner {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 7px 8px 7px 12px;
  transition: border-color .15s;
}
#input-inner:focus-within { border-color: var(--accent); }

#prompt {
  flex: 1;
  font: 13px/1.55 var(--sans);
  border: none;
  outline: none;
  resize: none;
  min-height: 22px;
  max-height: 140px;
  background: transparent;
  color: var(--text);
  padding: 2px 0;
}
#prompt::placeholder { color: var(--muted); }

#send {
  width: 32px; height: 32px;
  flex-shrink: 0;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
  font-size: 15px;
  line-height: 1;
}
#send:hover:not(:disabled) { background: var(--accent-d); transform: scale(1.04); }
#send:disabled { opacity: .35; cursor: not-allowed; transform: none; }

/* ── Footer ── */
#footer {
  padding: 4px 14px 5px;
  font: 10px/1 var(--sans);
  color: var(--dim);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
#token-info { color: var(--muted); font: 600 10px/1 var(--sans); letter-spacing: .03em; }
</style>
</head>
<body>

<div id="config-bar">
  <span class="brand">FortiAIScout</span>

  <label for="key-input">key</label>
  <input id="key-input" type="password" placeholder="sk-bf-… or sk-ant-…" autocomplete="off" />

  <label for="model-sel">model</label>
  <select id="model-sel">
    <option value="claude-haiku-4-5">haiku 4.5 ⚡</option>
    <option value="claude-sonnet-4-6" selected>sonnet 4.6</option>
    <option value="claude-opus-4-8">opus 4.8</option>
  </select>

  <label for="tokens-sel">tokens</label>
  <select id="tokens-sel">
    <option value="1024">1k</option>
    <option value="2048" selected>2k</option>
    <option value="4096">4k</option>
    <option value="8192">8k</option>
  </select>

  <span id="status">—</span>
</div>

<div id="log"></div>

<div id="input-wrap">
  <div id="input-inner">
    <textarea id="prompt" placeholder="Ask anything…" rows="1"
      oninput="resize(this)" onkeydown="onKey(event)"></textarea>
    <button id="send" onclick="send()" title="Send (Enter)">↑</button>
  </div>
</div>

<div id="footer">
  <span>shift+enter for newline</span>
  <span id="token-info"></span>
</div>

<script>
const BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? `${location.protocol}//${location.host}/proxy`
  : '';

const history = [];
let busy = false;

const el  = id => document.getElementById(id);
const st  = (msg, cls='') => { const s = el('status'); s.textContent = msg; s.className = cls; };

// ── Markdown ──────────────────────────────────────────────────────────────────
function render(t) {
  const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${e(c.trimEnd())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g,    (_,c) => `<code>${e(c)}</code>`);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,     '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;opacity:.85">$1</a>');
  return t;
}

// ── Greeting ──────────────────────────────────────────────────────────────────
(async () => {
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  let name = '';
  try {
    const r = await fetch('/config');
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.user_name) name = ', ' + cfg.user_name.charAt(0).toUpperCase() + cfg.user_name.slice(1);
    }
  } catch { /* serve.py not running */ }
  appendTurn('ai', `**${greet}${name}!** — I'm your Web AI Assistant, built into the browser. I can help you understand the page you're viewing and connect directly to your FortiCNAPP environment.\n\n• **Read** / **TL;DR** — load the current page into context or generate a concise summary\n• **Scan Code** — run SCA and SAST scans against code found on the current page or a GitHub repository\n• **FortiCNAPP Security Tools** (Cloud Security) — run compliance reports, search CVEs, execute LQL queries, and investigate cloud assets, vulnerabilities, risks, and security posture\n\nType anything to get started.`);
})();

// ── Persist key ───────────────────────────────────────────────────────────────
const ki = el('key-input');
const saved = localStorage.getItem('bf_key');
if (saved) ki.value = saved;
ki.addEventListener('change', () => {
  const v = ki.value.trim();
  v ? localStorage.setItem('bf_key', v) : localStorage.removeItem('bf_key');
});

// ── Textarea auto-resize ──────────────────────────────────────────────────────
function resize(t) { t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 140) + 'px'; }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

// ── Append bubble ─────────────────────────────────────────────────────────────
function appendTurn(role, text = '', modelLabel = '') {
  const wrap = document.createElement('div');
  wrap.className = `turn turn-${role}`;

  const avatar = document.createElement('div');
  avatar.className = `role ${role}`;
  avatar.textContent = role === 'user' ? 'You' : role === 'ai' ? 'AI' : '';

  const col = document.createElement('div');
  col.className = 'bubble-col';

  const lbl = document.createElement('div');
  lbl.className = 'turn-label';
  lbl.textContent = role === 'user' ? 'You' : role === 'ai' ? (modelLabel || 'AI') : 'System';

  const body = document.createElement('div');
  body.className = 'content';
  if (text) body.innerHTML = render(text);

  if (role === 'ai') {
    const copyBtn = makeCopyBtn(body);
    body._copyBtn = copyBtn;
    body.appendChild(copyBtn);
  }

  col.append(lbl, body);
  wrap.append(avatar, col);
  el('log').appendChild(wrap);
  scrollLog();
  return body;
}

function makeCopyBtn(targetBody) {
  const btn = document.createElement('button');
  btn.className = 'rc-copy-btn';
  btn.textContent = 'Copy';
  btn.title = 'Copy response';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const txt = targetBody.innerText.replace(/\nCopy$/, '').trim();
    navigator.clipboard.writeText(txt).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    });
  });
  return btn;
}

function scrollLog() { const l = el('log'); l.scrollTop = l.scrollHeight; }

// ── Send ──────────────────────────────────────────────────────────────────────
async function send() {
  if (busy) return;

  const key   = el('key-input').value.trim();
  const model = el('model-sel').value;
  const maxTk = parseInt(el('tokens-sel').value);
  const text  = el('prompt').value.trim();

  if (!key)  { appendTurn('system', 'No API key — enter your key in the config bar.'); return; }
  if (!text) return;

  history.push({ role: 'user', content: text });
  appendTurn('user', text);
  el('prompt').value = '';
  el('prompt').style.height = 'auto';

  const shortModel = model.replace('claude-', '');
  const aiBubble = appendTurn('ai', '', shortModel);
  const cursor   = Object.assign(document.createElement('span'), { className: 'cursor' });
  aiBubble.insertBefore(cursor, aiBubble._copyBtn || null);

  busy = true;
  el('send').disabled = true;
  st('streaming', 'busy');

  let out = '', inputTk = 0, outputTk = 0;

  try {
    const res = await fetch(`${BASE_URL}/v1/messages`, {
      method:  'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         key,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({ model, max_tokens: maxTk, stream: true, messages: history }),
    });

    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') break;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            out += ev.delta.text;
            const copyBtn = aiBubble._copyBtn;
            aiBubble.innerHTML = render(out);
            aiBubble.appendChild(cursor);
            if (copyBtn) { aiBubble._copyBtn = copyBtn; aiBubble.appendChild(copyBtn); }
            scrollLog();
          }
          if (ev.type === 'message_start') inputTk  = ev.message?.usage?.input_tokens  ?? 0;
          if (ev.type === 'message_delta') outputTk = ev.usage?.output_tokens ?? 0;
        } catch (_) {}
      }
    }

    cursor.remove();
    const copyBtn = aiBubble._copyBtn;
    aiBubble.innerHTML = render(out);
    if (copyBtn) { aiBubble._copyBtn = copyBtn; aiBubble.appendChild(copyBtn); }
    history.push({ role: 'assistant', content: out });
    st('ready', 'ok');
    el('token-info').textContent = `↑ ${inputTk}  ↓ ${outputTk}  total ${inputTk + outputTk} tokens`;

  } catch (err) {
    cursor.remove();
    aiBubble.textContent = `Error: ${err.message}`;
    history.pop();
    st('error', 'err');
  } finally {
    busy = false;
    el('send').disabled = false;
    scrollLog();
  }
}

el('prompt').focus();
</script>
</body>
</html>
