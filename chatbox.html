<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web AI Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f6f8;
  --surface:   #ffffff;
  --border:    #e2e4e9;
  --accent:    #EE3124;
  --accent-d:  #c41e14;
  --accent-lt: #fff0ef;
  --navy:      #1a1a2e;
  --navy-d:    #111120;
  --text:      #111827;
  --text-body: #374151;
  --muted:     #9ca3af;
  --ok:        #16a34a;
  --err:       #dc2626;
  --code-bg:   #f1f3f5;
  --user-bg:   #EE3124;
  --user-text: #ffffff;
  --ai-bg:     #ffffff;
  --ai-text:   #1f2937;
  --mono:      "SF Mono", "Fira Code", "Consolas", monospace;
  --sans:      -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
  --radius:    18px;
}

html, body {
  height: 100dvh;
  font-family: var(--sans);
  font-size: 14px;
  background: var(--bg);
  color: var(--text-body);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
  height: 54px;
  background: var(--navy);
  border-bottom: 3px solid var(--accent);
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-right: 6px;
}

.brand img {
  height: 20px;
  filter: brightness(0) invert(1);
}

.brand-sep {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,.2);
}

.brand-label {
  font: 600 13px/1 var(--sans);
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.85);
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-group label {
  color: rgba(255,255,255,.4);
  font: 600 10px/1 var(--sans);
  letter-spacing: .06em;
  text-transform: uppercase;
}

#header input, #header select {
  font: 13px/1 var(--sans);
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.16);
  color: #fff;
  padding: 5px 9px;
  border-radius: 6px;
  outline: none;
  transition: border-color .15s;
}

#header input:focus, #header select:focus { border-color: var(--accent); }
#header select option { background: var(--navy-d); }
#header input::placeholder { color: rgba(255,255,255,.3); }
#key-input { width: 190px; }

#status {
  margin-left: auto;
  font: 600 10px/1 var(--sans);
  letter-spacing: .06em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
  transition: color .2s;
  white-space: nowrap;
}
#status.ok   { color: #4ade80; }
#status.err  { color: #f87171; }
#status.busy { color: rgba(255,255,255,.6); }

/* ── Message log ── */
#log {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}

#log::-webkit-scrollbar { width: 4px; }
#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Chat bubbles ── */
.turn {
  display: flex;
  flex-direction: column;
  padding: 2px 18px;
  animation: msgIn .14s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}

.turn-user { align-items: flex-end; }
.turn-ai   { align-items: flex-start; }
.turn-system { align-items: center; }

.role-label {
  font: 600 10px/1 var(--sans);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 4px;
  padding: 0 4px;
}

.turn-user .role-label   { color: var(--accent); }
.turn-ai   .role-label   { color: var(--muted); }
.turn-system .role-label { color: var(--muted); }

.bubble {
  max-width: 76%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font: 14px/1.6 var(--sans);
  word-break: break-word;
  overflow-wrap: anywhere;
  white-space: pre-wrap;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
}

.turn-user .bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-bottom-right-radius: 5px;
}

.turn-ai .bubble {
  background: var(--ai-bg);
  color: var(--ai-text);
  border-bottom-left-radius: 5px;
  border: 1px solid var(--border);
}

.turn-system .bubble {
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  box-shadow: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 5px 12px;
  max-width: 90%;
}

/* ── Code inside bubbles ── */
.bubble code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--code-bg);
  color: var(--accent-d);
  padding: 1px 5px;
  border-radius: 4px;
}

.turn-user .bubble code {
  background: rgba(255,255,255,.18);
  color: #fff;
}

.bubble pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  margin: 6px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre;
}

.bubble pre code { background: none; padding: 0; border: none; color: var(--text-body); }

.turn-user .bubble pre {
  background: rgba(0,0,0,.15);
  border-color: rgba(255,255,255,.2);
  color: #fff;
}

.turn-user .bubble pre code { color: #fff; }

/* ── Streaming cursor ── */
.cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .7s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input bar ── */
#input-wrap {
  padding: 12px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#input-inner {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 14px;
  transition: border-color .15s, box-shadow .15s;
}

#input-inner:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(238,49,36,.08);
}

#prompt {
  flex: 1;
  font: 14px/1.55 var(--sans);
  border: none;
  outline: none;
  resize: none;
  min-height: 24px;
  max-height: 160px;
  background: transparent;
  color: var(--text);
  padding: 2px 0;
}

#prompt::placeholder { color: var(--muted); }

#send {
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
  font-size: 16px;
  line-height: 1;
}

#send:hover:not(:disabled) { background: var(--accent-d); transform: scale(1.04); }
#send:disabled { opacity: .35; cursor: not-allowed; transform: none; }

/* ── Footer hint ── */
#footer {
  padding: 4px 18px 6px;
  font: 11px/1 var(--sans);
  color: rgba(255,255,255,.3);
  background: var(--navy);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

#token-info { color: rgba(255,255,255,.45); font: 600 10px/1 var(--sans); letter-spacing: .03em; }
</style>
</head>
<body>

<div id="header">
  <div class="brand">
    <img src="https://www.fortinet.com/content/dam/fortinet-blog/fortinet-logo-white.svg" alt="Fortinet" />
    <div class="brand-sep"></div>
    <span class="brand-label">Web AI Agent</span>
  </div>

  <div class="ctrl-group">
    <label for="key-input">key</label>
    <input id="key-input" type="password" placeholder="sk-bf-… or sk-ant-…" autocomplete="off" />
  </div>

  <div class="ctrl-group">
    <label for="model">model</label>
    <select id="model">
      <option value="claude-haiku-4-5">haiku 4.5 ⚡</option>
      <option value="claude-sonnet-4-6" selected>sonnet 4.6</option>
      <option value="claude-opus-4-8">opus 4.8</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label for="max-tokens">tokens</label>
    <select id="max-tokens">
      <option value="1024">1k</option>
      <option value="2048" selected>2k</option>
      <option value="4096">4k</option>
      <option value="8192">8k</option>
    </select>
  </div>

  <span id="status">—</span>
</div>

<div id="log"></div>

<div id="input-wrap">
  <div id="input-inner">
    <textarea id="prompt" placeholder="Ask anything…" rows="1"
      oninput="resize(this)" onkeydown="onKey(event)"></textarea>
    <button id="send" onclick="send()" title="Send (Enter)">↑</button>
  </div>
</div>

<div id="footer">
  <span>shift+enter for newline</span>
  <span id="token-info"></span>
</div>

<script>
const BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? `${location.protocol}//${location.host}/proxy`
  : '';

const history = [];
let busy = false;

const $ = id => document.getElementById(id);
const st = (msg, cls='') => { const s=$('status'); s.textContent=msg; s.className=cls; };

// ── Markdown ──────────────────────────────────────────────────────────────────
function render(t) {
  const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${e(c.trimEnd())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g,    (_,c) => `<code>${e(c)}</code>`);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,     '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;opacity:.85">$1</a>');
  return t;
}

// ── Persist key ───────────────────────────────────────────────────────────────
const ki = $('key-input');
const saved = localStorage.getItem('bf_key');
if (saved) ki.value = saved;
ki.addEventListener('change', () => {
  const v = ki.value.trim();
  v ? localStorage.setItem('bf_key', v) : localStorage.removeItem('bf_key');
});

// ── Textarea auto-resize ──────────────────────────────────────────────────────
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

// ── Append bubble ─────────────────────────────────────────────────────────────
function appendTurn(role, text='', modelLabel='') {
  const wrap = document.createElement('div');
  wrap.className = `turn turn-${role}`;

  const lbl = document.createElement('div');
  lbl.className = 'role-label';
  lbl.textContent = role === 'user' ? 'You' : role === 'ai' ? (modelLabel || 'AI') : 'System';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (text) bubble.innerHTML = render(text);

  wrap.append(lbl, bubble);
  $('log').appendChild(wrap);
  scrollLog();
  return bubble;
}

function scrollLog() {
  const l = $('log'); l.scrollTop = l.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function send() {
  if (busy) return;

  const key   = $('key-input').value.trim();
  const model = $('model').value;
  const maxTk = parseInt($('max-tokens').value);
  const text  = $('prompt').value.trim();

  if (!key)  { appendTurn('system', 'No API key — enter your key in the toolbar.'); return; }
  if (!text) return;

  history.push({ role: 'user', content: text });
  appendTurn('user', text);
  $('prompt').value = '';
  $('prompt').style.height = 'auto';

  const shortModel = model.replace('claude-','');
  const aiBubble = appendTurn('ai', '', shortModel);
  const cursor   = Object.assign(document.createElement('span'), { className: 'cursor' });
  aiBubble.appendChild(cursor);

  busy = true;
  $('send').disabled = true;
  st('●  streaming', 'busy');

  let out = '', inputTk = 0, outputTk = 0;

  try {
    const res = await fetch(`${BASE_URL}/v1/messages`, {
      method:  'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         key,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({ model, max_tokens: maxTk, stream: true, messages: history }),
    });

    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (raw === '[DONE]') break;
        try {
          const ev = JSON.parse(raw);
          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            out += ev.delta.text;
            aiBubble.innerHTML = render(out);
            aiBubble.appendChild(cursor);
            scrollLog();
          }
          if (ev.type === 'message_start')  inputTk  = ev.message?.usage?.input_tokens ?? 0;
          if (ev.type === 'message_delta')  outputTk = ev.usage?.output_tokens ?? 0;
        } catch (_) {}
      }
    }

    cursor.remove();
    aiBubble.innerHTML = render(out);
    history.push({ role: 'assistant', content: out });
    st('✓', 'ok');
    $('token-info').textContent = `↑ ${inputTk}  ↓ ${outputTk}  total ${inputTk+outputTk} tokens`;

  } catch (err) {
    cursor.remove();
    aiBubble.textContent = `Error: ${err.message}`;
    history.pop();
    st('error', 'err');
  } finally {
    busy = false;
    $('send').disabled = false;
    scrollLog();
  }
}

$('prompt').focus();
</script>
</body>
</html>
